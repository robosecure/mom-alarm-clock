<?xml version="1.0" encoding="UTF-8"?>
<!-- Launch logo: white clock on transparent, for use on pink launch background -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <g transform="translate(200 210) rotate(-6)">
    <!-- Bells -->
    <circle cx="-80" cy="-100" r="28" fill="#FFFFFF"/>
    <circle cx="80" cy="-100" r="28" fill="#FFFFFF"/>
    <!-- Face -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#FFFFFF" stroke-width="10"/>
    <!-- Hour markers -->
    <rect x="-3" y="-100" width="6" height="12" rx="2" fill="#FFFFFF"/>
    <rect x="88" y="-3" width="12" height="6" rx="2" fill="#FFFFFF"/>
    <rect x="-3" y="88" width="6" height="12" rx="2" fill="#FFFFFF"/>
    <rect x="-100" y="-3" width="12" height="6" rx="2" fill="#FFFFFF"/>
    <!-- Hands (7:00) -->
    <line x1="0" y1="0" x2="-38" y2="36" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-70" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <!-- Center cap -->
    <circle cx="0" cy="0" r="8" fill="#FFFFFF"/>
  </g>
</svg>
